name: Claude Code Action smoke test

on:
  pull_request:
    types: [opened, reopened]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.CLAUDE_API_KEY }}
          prompt: |
            このPRの変更内容を確認し、「人間によるレビューが必要かどうか」を判定してください。
            マージやApprove等のGitHub操作は一切行わないでください。判定結果を出力するだけで構いません。

            判定基準:
            - 振る舞いが変わらない軽微な変更（typo修正、コメント追加、フォーマット調整等）は「レビュー不要」
            - ロジックの変更、挙動に影響する変更は「レビュー必要」

            出力形式:
            - 判定: 必要 or 不要
            - 理由: 具体的な根拠
          claude_args: |
            --max-turns 15
            --model claude-sonnet-4-6
          show_full_output: true
          track_progress: true
