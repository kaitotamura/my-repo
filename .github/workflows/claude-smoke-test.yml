name: Claude Code Action smoke test

on:
  issue_comment:
    types: [created]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.CLAUDE_API_KEY }}
          prompt: |
            これはClaude Code Actionの思考テストです。ファイル操作は不要です。
            以下の問題を1ステップずつ考えて解いてください。

            1. フィボナッチ数列の20番目の値を計算する
            2. その値が素数かどうか判定する
            3. 判定の根拠を簡潔に説明する

            各ステップでの考え方も示しながら、最終的な結論を出力してください。
          claude_args: |
            --max-turns 15
            --model claude-sonnet-4-6
          show_full_output: true
          track_progress: true
