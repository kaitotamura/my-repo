name: Claude Code Action smoke test

on:
  issue_comment:
    types: [created]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.CLAUDE_API_KEY }}
          prompt: |
            これはClaude Code Actionの動作確認です。
            「Claude Code Actionは正常に動作しています」という一文だけを出力してください。
          claude_args: |
            --max-turns 3
            --model claude-sonnet-4-6
